# Spark 4.0.2 log4j2 configuration
rootLogger.level = warn
rootLogger.appenderRef.console.ref = console

appender.console.type = Console
appender.console.name = console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n%ex

# Suppress Iceberg HadoopTableOperations version-hint.text warnings
# These are expected on first createOrReplace() when table doesn't exist yet
logger.iceberg_hadoop.name = org.apache.iceberg.hadoop.HadoopTableOperations
logger.iceberg_hadoop.level = error

# Suppress Gluten fallback reporter (expected in vanilla mode)
logger.gluten_fallback.name = org.apache.gluten.extension.columnar.transition.GlutenFallbackReporter
logger.gluten_fallback.level = error

# Suppress NativeCodeLoader warning — no native Hadoop .so in this image,
# pure-Java fallback is used automatically with no functional difference
logger.native_code_loader.name = org.apache.hadoop.util.NativeCodeLoader
logger.native_code_loader.level = error
