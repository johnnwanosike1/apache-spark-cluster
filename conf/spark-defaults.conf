# =============================================================================
# Spark baseline configuration
#
# Gluten/Velox is toggled via GLUTEN_ENABLED env variable in docker-compose —
# NOT here. This lets the same image run in both vanilla and Gluten mode.
# =============================================================================

# ---------------------------------------------------------------------------
# Cluster
# ---------------------------------------------------------------------------
spark.master                                    spark://spark-master:7077
spark.executor.memory                           2g
spark.driver.memory                             1g
spark.executor.cores                            2

# ---------------------------------------------------------------------------
# SQL / Shuffle
# ---------------------------------------------------------------------------
spark.sql.shuffle.partitions                    24
spark.serializer                                org.apache.spark.serializer.KryoSerializer
spark.sql.adaptive.enabled                      true
spark.sql.adaptive.coalescePartitions.enabled   true

# ---------------------------------------------------------------------------
# Event logging (History Server)
# ---------------------------------------------------------------------------
spark.eventLog.enabled                          true
spark.eventLog.dir                              /opt/spark/logs
spark.history.fs.logDirectory                   /opt/spark/logs
spark.history.ui.port                           18080

# ---------------------------------------------------------------------------
# Apache Iceberg
# ---------------------------------------------------------------------------
spark.sql.extensions                            org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.local                         org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.local.type                    hadoop
spark.sql.catalog.local.warehouse               /workspace/data/warehouse/iceberg

# ---------------------------------------------------------------------------
# Delta Lake
# ---------------------------------------------------------------------------
spark.sql.catalog.spark_catalog                 org.apache.spark.sql.delta.catalog.DeltaCatalog

# ---------------------------------------------------------------------------
# Arrow (required for Pandas UDFs and Gluten)
# ---------------------------------------------------------------------------
spark.sql.execution.arrow.pyspark.enabled       true
