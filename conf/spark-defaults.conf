# =============================================================================
# Spark 4.0.2 baseline configuration
# Gluten/Velox additions are appended at runtime by entrypoint.sh
# =============================================================================

spark.master                                    spark://spark-master:7077
spark.executor.memory                           2g
spark.driver.memory                             1g
spark.executor.cores                            2

spark.sql.shuffle.partitions                    24
spark.serializer                                org.apache.spark.serializer.KryoSerializer
spark.sql.adaptive.enabled                      true
spark.sql.adaptive.coalescePartitions.enabled   true

spark.eventLog.enabled                          true
spark.eventLog.dir                              /opt/spark/logs
spark.history.fs.logDirectory                   /opt/spark/logs
spark.history.ui.port                           18080

spark.sql.extensions                            org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.local                         org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.local.type                    hadoop
spark.sql.catalog.local.warehouse               /workspace/data/warehouse/iceberg
spark.sql.catalog.spark_catalog                 org.apache.spark.sql.delta.catalog.DeltaCatalog

spark.sql.execution.arrow.pyspark.enabled       true

# ---------------------------------------------------------------------------
# Gluten/Velox compatibility
# ---------------------------------------------------------------------------
# Gluten does not support ANSI mode -- disable to prevent fallback warnings
# like: "Validation failed for plan: Range, due to: does not support ansi mode"
spark.sql.ansi.enabled                          false

# Suppress Gluten fallback reporter warnings (ANSI mode fallbacks are expected)
spark.driver.extraJavaOptions                   -Dlog4j2.logger.gluten_fallback.name=org.apache.gluten.extension.columnar.transition.GlutenFallbackReporter -Dlog4j2.logger.gluten_fallback.level=ERROR -Dlog4j2.logger.iceberg_hadoop.name=org.apache.iceberg.hadoop.HadoopTableOperations -Dlog4j2.logger.iceberg_hadoop.level=ERROR
spark.executor.extraJavaOptions                 -Dlog4j2.logger.gluten_fallback.name=org.apache.gluten.extension.columnar.transition.GlutenFallbackReporter -Dlog4j2.logger.gluten_fallback.level=ERROR -Dlog4j2.logger.iceberg_hadoop.name=org.apache.iceberg.hadoop.HadoopTableOperations -Dlog4j2.logger.iceberg_hadoop.level=ERROR

# Disable BypassMergeSortShuffleWriter -- incompatible with Gluten columnar serializer
# (causes UnsupportedOperationException in ColumnarBatchSerializerInstanceImpl)
spark.shuffle.sort.bypassMergeThreshold            0
