name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Stack: Spark 4.0.2 | Gluten 1.6.0 | Iceberg 1.10.1 | Delta 4.0.1

jobs:
  validate:
    name: Validate configs & scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # DL3008 — apt-get pin versions (intentionally unpinned)
          # DL3009 — apt-get clean (handled by --no-install-recommends)
          # DL3013 — pip pin versions (intentionally pinned where needed)
          # DL3042 — pip --no-cache-dir (already present)
          # SC2086 — double-quote variables (false positives in heredocs)
          ignore: DL3002,DL3008,DL3009,DL3013,DL3042,DL4006,SC2086

      - name: Validate docker-compose syntax
        run: docker compose config --quiet

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: |
          python -m py_compile scripts/generate_data.py
          python -m py_compile scripts/test_connection.py
          echo "Python scripts: syntax OK"

      - name: Validate notebook JSON
        run: |
          python - <<'PYEOF'
          import json, sys, pathlib
          failed = 0
          for nb in sorted(pathlib.Path("notebooks").glob("*.ipynb")):
              try:
                  json.loads(nb.read_text())
                  print(f"  OK   {nb}")
              except Exception as e:
                  print(f"  FAIL {nb}: {e}")
                  failed += 1
          sys.exit(failed)
          PYEOF

      - name: Validate spark-defaults.conf
        run: |
          python - <<'PYEOF'
          import pathlib, sys
          conf = pathlib.Path("conf/spark-defaults.conf").read_text()
          required = [
              "spark.sql.ansi.enabled",
              "spark.shuffle.sort.bypassMergeThreshold",
              "spark.sql.adaptive.enabled",
              "spark.eventLog.enabled",
          ]
          failed = 0
          for key in required:
              if key in conf:
                  print(f"  OK   {key}")
              else:
                  print(f"  MISSING {key}")
                  failed += 1
          sys.exit(failed)
          PYEOF

      - name: Check entrypoint is executable
        run: |
          test -x entrypoint.sh \
            && echo "entrypoint.sh: executable OK" \
            || (echo "entrypoint.sh: NOT executable" && exit 1)

      - name: Check entrypoint has no CRLF line endings
        run: |
          if file entrypoint.sh | grep -q CRLF; then
            echo "entrypoint.sh: CRLF line endings detected — will break on Linux"
            exit 1
          else
            echo "entrypoint.sh: LF line endings OK"
          fi

      - name: Check no stale version refs in docs
        run: |
          python - <<'PYEOF'
          import pathlib, sys
          stale = ["4.1.1", "3.5.8", "scala2.12", "1.4.0", "3.3.1", "1.5.2"]
          check_files = ["README.md", "CHANGELOG.md", "entrypoint.sh", "conf/spark-defaults.conf", ".env.example"]
          failed = 0
          for fname in check_files:
              text = pathlib.Path(fname).read_text()
              for ref in stale:
                  # Allow refs in CHANGELOG historical entries
                  if ref in text and fname != "CHANGELOG.md":
                      print(f"  STALE ref '{ref}' found in {fname}")
                      failed += 1
          if not failed:
              print("  OK   no stale version refs found")
          sys.exit(failed)
          PYEOF
