# =============================================================================
# docker-compose.override.yml — local customisation
#
# Docker Compose automatically merges this file with docker-compose.yml.
# Use it to tweak resources or add mounts for your local setup without
# modifying the main compose file (which is tracked in git).
#
# Examples below are commented out — uncomment what you need.
# =============================================================================

services:

  spark-worker-1:
    environment:
      # Increase cores/memory if your machine has more headroom
      SPARK_WORKER_CORES: "${SPARK_WORKER_CORES:-2}"
      SPARK_WORKER_MEMORY: "${SPARK_WORKER_MEMORY:-2g}"

  spark-worker-2:
    environment:
      SPARK_WORKER_CORES: "${SPARK_WORKER_CORES:-2}"
      SPARK_WORKER_MEMORY: "${SPARK_WORKER_MEMORY:-2g}"

  notebook:
    environment:
      JUPYTER_TOKEN: "${JUPYTER_TOKEN:-spark}"

